<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>6Gate – Social Gateway</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f0f11; color: #e2e2e8; min-height: 100vh; display: flex; flex-direction: column; }
    header { background: #18181f; border-bottom: 1px solid #2a2a35; padding: 18px 24px; }
    header span { color: #818cf8; font-weight: 700; font-size: 1.1rem; }
    main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 24px; text-align: center; }
    h1 { font-size: 2.5rem; font-weight: 800; color: #fff; margin-bottom: 12px; }
    p { color: #6b7280; max-width: 480px; margin-bottom: 40px; font-size: 1.05rem; }
    .links { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
    .links a { display: inline-block; padding: 12px 28px; border-radius: 10px; text-decoration: none; font-weight: 500; font-size: 0.95rem; transition: background 0.15s; }
    .links a.primary { background: #4f46e5; color: #fff; }
    .links a.primary:hover { background: #4338ca; }
    .links a.secondary { background: #1e1e2e; color: #a5b4fc; border: 1px solid #2a2a35; }
    .links a.secondary:hover { background: #25253a; }
    footer { text-align: center; color: #4b5563; font-size: 0.8rem; padding: 24px; border-top: 1px solid #2a2a35; }
    footer a { color: #6b7280; text-decoration: none; }
    footer a:hover { color: #9ca3af; }
  </style>
</head>
<body>
  <header>
    <span>6Gate</span>
  </header>

  <main>
    <h1>6Gate</h1>
    <p>A local social media gateway for publishing videos to TikTok, YouTube, Facebook, and Instagram from your own machine.</p>
    <div class="links">
      <a class="primary" href="terms.html">Terms of Service</a>
      <a class="secondary" href="privacy.html">Privacy Policy</a>
    </div>
  </main>

  <footer>
    &copy; 2025 6Gate. All rights reserved. &nbsp;·&nbsp;
    <a href="terms.html">Terms of Service</a> &nbsp;·&nbsp;
    <a href="privacy.html">Privacy Policy</a>
  </footer>
</body>
</html>
