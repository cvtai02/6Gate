name: Deploy API (SSH)

# Continuous deploy for the 6Gate API. On push to main touching app/**, a
# GitHub-hosted runner SSHes into the VPS and runs deploy/remote-deploy.sh
# (git pull -> npm ci -> build -> pm2 reload). The UI is deployed by Vercel.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   VPS_HOST     - server IP/hostname (e.g. 116.118.9.84)
#   VPS_USER     - ssh user (e.g. root)
#   VPS_SSH_KEY  - private key whose public half is in the VPS authorized_keys
#   VPS_PORT     - optional, defaults to 22

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "deploy/remote-deploy.sh"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-api
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy over SSH
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          SSH_HOST: ${{ secrets.VPS_HOST }}
          SSH_USER: ${{ secrets.VPS_USER }}
          SSH_PORT: ${{ secrets.VPS_PORT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          PORT="${SSH_PORT:-22}"
          ssh -i ~/.ssh/deploy_key -p "$PORT" \
            -o StrictHostKeyChecking=accept-new \
            "$SSH_USER@$SSH_HOST" 'bash -s' < deploy/remote-deploy.sh
