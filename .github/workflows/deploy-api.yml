name: Deploy API (self-hosted)

# Continuous deploy for the 6Gate API on the VPS.
# On push to main that touches app/**, the self-hosted runner on the VPS pulls the
# latest code, rebuilds, and gracefully reloads the pm2 process. The UI is deployed
# separately by Vercel, so it's intentionally not handled here.
#
# Requirements (one-time, see deploy/DEPLOY-API.md):
#   - A self-hosted runner registered to this repo, running as the SAME user that owns
#     ~/6Gate and the pm2 process (root, in this setup) so `pm2 reload` finds 6gate-api.
#   - node, npm and pm2 available on that user's PATH.
#   - app/.env present on the VPS (gitignored — never touched by the pull).

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch: {}

# Never run two deploys at once; let an in-flight one finish.
concurrency:
  group: deploy-api
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull, build, reload
        run: |
          set -euo pipefail
          cd "$HOME/6Gate"
          git fetch origin main
          git reset --hard origin/main          # discard local drift; .env is gitignored so it's untouched
          cd app
          npm ci
          npm run build                          # -> dist/main.js (runs DB migrations on boot)
          pm2 reload 6gate-api --update-env || pm2 start ecosystem.config.js
          pm2 save
