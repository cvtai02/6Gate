# 6Gate API reverse proxy — api.6gate.minfect.com -> NestJS on 127.0.0.1:20130
# TLS: Cloudflare Origin Certificate (domain must be Cloudflare-proxied / orange cloud,
# SSL mode "Full (strict)"). No certbot.
#
# Cert/key are installed at:
#   /etc/ssl/cloudflare/api.6gate.minfect.com.pem   (Origin Certificate)
#   /etc/ssl/cloudflare/api.6gate.minfect.com.key   (Origin Private Key)

server {
    listen 80;
    listen [::]:80;
    server_name api.6gate.minfect.com;
    # Cloudflare sends traffic over 443; redirect any direct HTTP hit.
    return 301 https://$host$request_uri;
}

server {
    # `listen ... http2` works on all nginx versions (the standalone `http2 on;`
    # directive only exists in nginx >= 1.25.1).
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.6gate.minfect.com;

    ssl_certificate     /etc/ssl/cloudflare/api.6gate.minfect.com.pem;
    ssl_certificate_key /etc/ssl/cloudflare/api.6gate.minfect.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Allow large video uploads through the proxy (matches the app's 2gb body limit).
    # NOTE: Cloudflare's own upload cap still applies (100 MB on Free/Pro).
    client_max_body_size 2g;

    location / {
        proxy_pass http://127.0.0.1:20130;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE job-log streaming (/api/post-jobs/:id/events) and long uploads:
        # disable response buffering and use generous timeouts.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_set_header Connection "";
    }
}
